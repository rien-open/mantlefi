<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="910" viewBox="0 0 1480 910" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <marker id="arru" markerWidth="10" markerHeight="10" refX="3" refY="1" orient="auto" markerUnits="strokeWidth">
      <path d="M0,6 L3,0 L6,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="910" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="46" font-size="25" font-weight="700" fill="#202124">MantleFi — ハーネスエンジニアリング（我々仕様）</text>
  <text x="40" y="74" font-size="13" fill="#5f6368">read-only ／ 無料データ・無料モデル ／ no-fabrication（数値・判定は engine 由来・LLMは作らない）／ Mantle を下げない</text>

  <!-- legend -->
  <g font-size="12" fill="#202124">
    <rect x="1150" y="24" width="16" height="13" rx="2" fill="#e6f4ea" stroke="#34a853"/><text x="1174" y="35">実装済み（動いている）</text>
    <rect x="1150" y="46" width="16" height="13" rx="2" fill="#fef7e0" stroke="#f9ab00"/><text x="1174" y="57">軽量実装（read-only に十分）</text>
    <rect x="1150" y="68" width="16" height="13" rx="2" fill="#f1f3f4" stroke="#9aa0a6"/><text x="1174" y="79">意図的に不要</text>
    <rect x="1150" y="90" width="16" height="13" rx="2" fill="#fce8e6" stroke="#ea4335" stroke-dasharray="5 3"/><text x="1174" y="101">次の一手</text>
  </g>

  <!-- ===== blue concept labels above pipeline ===== -->
  <g font-size="12" fill="#1a56db" text-anchor="middle" font-weight="600">
    <text x="160" y="282">トリガー</text>
    <text x="325" y="282">コンテキスト取得</text>
    <text x="490" y="282">選別・キュレーション</text>
    <text x="655" y="282">ガード（前）</text>
    <text x="820" y="282">AI＝調査群</text>
    <text x="985" y="282">AI＝編集</text>
    <text x="1150" y="282">ガード（後）</text>
    <text x="1315" y="282">人への返却</text>
  </g>

  <!-- ===== pipeline arrows ===== -->
  <g stroke="#5f6368" stroke-width="2" marker-end="url(#arr)">
    <line x1="230" y1="344" x2="253" y2="344"/>
    <line x1="395" y1="344" x2="418" y2="344"/>
    <line x1="560" y1="344" x2="583" y2="344"/>
    <line x1="725" y1="344" x2="748" y2="344"/>
    <line x1="890" y1="344" x2="913" y2="344"/>
    <line x1="1055" y1="344" x2="1078" y2="344"/>
    <line x1="1220" y1="344" x2="1243" y2="344"/>
  </g>

  <!-- ===== pipeline boxes (all green = the core loop is fully implemented) ===== -->
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif">
    <!-- 1 trigger -->
    <rect x="90" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="102" y="320" font-size="14" font-weight="700" fill="#202124">⏰ heartbeat</text>
    <text x="102" y="343" font-size="11" fill="#3c4043">cron＝毎朝1回</text>
    <text x="102" y="361" font-size="11" fill="#3c4043">定期実行</text>
    <text x="102" y="385" font-size="10" fill="#80868b">monitor.main()</text>

    <!-- 2 scan -->
    <rect x="255" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="267" y="320" font-size="14" font-weight="700" fill="#202124">📡 scan</text>
    <text x="267" y="343" font-size="11" fill="#3c4043">37プールを取得</text>
    <text x="267" y="361" font-size="11" fill="#3c4043">決定論で分類</text>
    <text x="267" y="385" font-size="10" fill="#80868b">LLM不使用</text>

    <!-- 3 curation -->
    <rect x="420" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="432" y="320" font-size="14" font-weight="700" fill="#202124">🎯 注目を抽出</text>
    <text x="432" y="343" font-size="11" fill="#3c4043">本物top4＋変化</text>
    <text x="432" y="361" font-size="11" fill="#3c4043">上限6件</text>
    <text x="432" y="385" font-size="10" fill="#80868b">空回り防止</text>

    <!-- 4 guard-pre -->
    <rect x="585" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="597" y="320" font-size="14" font-weight="700" fill="#202124">🛡 ガード前</text>
    <text x="597" y="343" font-size="11" fill="#3c4043">no-fab / read-only</text>
    <text x="597" y="361" font-size="11" fill="#3c4043">slug whitelist</text>
    <text x="597" y="385" font-size="10" fill="#80868b">売買助言×</text>

    <!-- 5 investigators -->
    <rect x="750" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="762" y="320" font-size="13" font-weight="700" fill="#202124">🕵 調査群</text>
    <text x="762" y="343" font-size="11" fill="#3c4043">maverick・各自</text>
    <text x="762" y="361" font-size="11" fill="#3c4043">ReActでチェーン検証</text>
    <text x="762" y="385" font-size="10" fill="#80868b">fan-out（N体）</text>

    <!-- 6 editor -->
    <rect x="915" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="927" y="320" font-size="13" font-weight="700" fill="#202124">✏️ 編集</text>
    <text x="927" y="343" font-size="11" fill="#3c4043">glm-5.1</text>
    <text x="927" y="361" font-size="11" fill="#3c4043">findingsを統合</text>
    <text x="927" y="385" font-size="10" fill="#80868b">1 digestに</text>

    <!-- 7 guard-post -->
    <rect x="1080" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="1092" y="320" font-size="14" font-weight="700" fill="#202124">🛡 ガード後</text>
    <text x="1092" y="343" font-size="11" fill="#3c4043">捏造ガード</text>
    <text x="1092" y="361" font-size="11" fill="#3c4043">創作は捨て</text>
    <text x="1092" y="385" font-size="10" fill="#80868b">engine-only degrade</text>

    <!-- 8 deliver -->
    <rect x="1245" y="292" width="140" height="104" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
    <text x="1257" y="320" font-size="14" font-weight="700" fill="#202124">📨 Telegram</text>
    <text x="1257" y="343" font-size="11" fill="#3c4043">push</text>
    <text x="1257" y="361" font-size="11" fill="#3c4043">既知chatへ</text>
    <text x="1257" y="385" font-size="10" fill="#80868b">一方向</text>
  </g>

  <!-- approval gate above box8 -->
  <rect x="1215" y="196" width="205" height="62" rx="9" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.6"/>
  <text x="1227" y="220" font-size="12.5" font-weight="700" fill="#202124">✋ 承認ゲート ＝ --dry</text>
  <text x="1227" y="240" font-size="11" fill="#3c4043">人が中身を見てから push する</text>
  <line x1="1317" y1="258" x2="1317" y2="290" stroke="#f9ab00" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== lower band: tools / multiagent / memory ===== -->
  <g font-size="12" fill="#1a56db" text-anchor="middle" font-weight="600">
    <text x="405" y="456">記憶＝トリガー・保管形式・場所</text>
    <text x="840" y="456">ツール使用・MCP＝スキーマ／プロンプト設計</text>
    <text x="1162" y="456">マルチエージェント構成＝通信・コンテキスト分散</text>
  </g>

  <!-- memory feeds curation (arrow up) -->
  <line x1="490" y1="470" x2="490" y2="400" stroke="#9aa0a6" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arru)"/>
  <text x="500" y="438" font-size="10" fill="#80868b">前回比に使用</text>
  <!-- tools feed investigators (arrow up) -->
  <line x1="820" y1="470" x2="820" y2="400" stroke="#9aa0a6" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arru)"/>
  <!-- comms: investigators -> editor (arrow up to editor box) -->
  <line x1="985" y1="470" x2="985" y2="400" stroke="#9aa0a6" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arru)"/>

  <!-- memory box (light = 軽量実装) -->
  <rect x="255" y="470" width="300" height="86" rx="9" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.6"/>
  <text x="269" y="497" font-size="13" font-weight="700" fill="#202124">💾 記憶</text>
  <text x="269" y="518" font-size="11" fill="#3c4043">snapshot / history / report</text>
  <text x="269" y="536" font-size="11" fill="#3c4043">＝ 前回比の"変化"検出（保存=JSON+MD）</text>

  <!-- tools box (green) -->
  <rect x="690" y="470" width="300" height="86" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
  <text x="704" y="497" font-size="13" font-weight="700" fill="#202124">🔧 道具の原子化</text>
  <text x="704" y="518" font-size="11" fill="#3c4043">5ツール(scan/judge/find_token/flow…)</text>
  <text x="704" y="536" font-size="11" fill="#3c4043">＋ RPCでチェーン直読み(残高/symbol/getCode)</text>

  <!-- multiagent box (green) -->
  <rect x="985" y="470" width="385" height="86" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="1.6"/>
  <text x="999" y="497" font-size="13" font-weight="700" fill="#202124">🤝 マルチエージェント</text>
  <text x="999" y="518" font-size="11" fill="#3c4043">調査findings(dict) → 編集へ受け渡し</text>
  <text x="999" y="536" font-size="11" fill="#3c4043">役割でモデル分担（調査=量 maverick・編集=質 glm）</text>

  <!-- ===== bottom: intentionally-skipped + the next move ===== -->
  <g font-size="12" fill="#1a56db" text-anchor="middle" font-weight="600">
    <text x="240" y="624">圧縮のトリガーとロジック</text>
    <text x="575" y="624">人間による介入の実現方法</text>
  </g>

  <rect x="90" y="638" width="300" height="66" rx="9" fill="#f1f3f4" stroke="#9aa0a6" stroke-width="1.4" stroke-dasharray="2 0"/>
  <text x="104" y="664" font-size="13" font-weight="700" fill="#5f6368">🗜 圧縮（context圧縮）</text>
  <text x="104" y="686" font-size="11" fill="#80868b">不要：1 run が短く溢れない</text>

  <rect x="410" y="638" width="330" height="66" rx="9" fill="#f1f3f4" stroke="#9aa0a6" stroke-width="1.4"/>
  <text x="424" y="664" font-size="13" font-weight="700" fill="#5f6368">👤 ループ途中の人間介入</text>
  <text x="424" y="686" font-size="11" fill="#80868b">不要：read-only の一方向設計（過剰回避）</text>

  <!-- next move bar -->
  <text x="737" y="744" font-size="12" fill="#1a56db" text-anchor="middle" font-weight="600">セッション全体の監視 ＝ 追跡の粒度・行動パスの評価方法</text>
  <rect x="90" y="756" width="1295" height="92" rx="11" fill="#fce8e6" stroke="#ea4335" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="112" y="788" font-size="15" font-weight="700" fill="#c5221f">⚠️ 次の一手：Vercel の「顔」＝ 群が動く所を画面化</text>
  <text x="112" y="812" font-size="12" fill="#3c4043">調査エージェントが各プールを「どう辿り → 何を確認したか」を可視化／全数値はクリックで Mantlescan の出典へ（＝no-fab を"視覚の主役"に）</text>
  <text x="112" y="832" font-size="12" fill="#3c4043">この図の右側「監視・行動パス評価・人への返却」を一気に埋め、審査員がスクショできる "群が動く wow" になる。</text>
</svg>
